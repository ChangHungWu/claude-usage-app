<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>Claude 用量</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Claude 用量">
<meta name="theme-color" content="#fdf6f0">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<style>
*{box-sizing:border-box}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{margin:0;font-family:-apple-system,"Noto Sans TC",sans-serif;color:#5c5470;
  background:linear-gradient(160deg,#fdf6f0 0%,#fceef5 45%,#eef3fd 100%);
  display:flex;flex-direction:column;
  padding:calc(env(safe-area-inset-top) + 14px)
          calc(env(safe-area-inset-right) + 20px)
          calc(env(safe-area-inset-bottom) + 14px)
          calc(env(safe-area-inset-left) + 20px)}
.hdr{flex:none;display:flex;align-items:baseline;gap:10px;margin-bottom:12px}
h1{font-size:21px;font-weight:800;margin:0;color:#4a4358;letter-spacing:.5px}
.upd{color:#a89fb8;font-size:12px}
#cards{flex:1;min-height:0;display:flex;flex-direction:column;gap:12px}
.card{flex:1;min-height:0;background:rgba(255,255,255,.85);border-radius:24px;
  box-shadow:0 6px 20px rgba(180,160,200,.18);
  display:flex;align-items:center;justify-content:center;gap:6%;padding:10px 6%}
.donut{height:86%;max-height:170px;aspect-ratio:1;flex:none}
.track{stroke:#f1eaf7}
.val{stroke:url(#gPur);transition:stroke-dashoffset .6s}
.hi .val{stroke:url(#gPink)}
.dpc{font-size:27px;font-weight:800;fill:#4a4358;font-variant-numeric:tabular-nums}
.dic{font-size:17px}
.info{display:flex;flex-direction:column;gap:4px;min-width:0}
.nm{font-size:18px;font-weight:700;color:#4a4358}
.sub{font-size:12px;color:#a89fb8}
.rs{font-size:12px;color:#a89fb8;margin-top:4px}
.err{margin:auto;background:rgba(255,255,255,.85);border-radius:24px;padding:24px 22px;
  text-align:center;box-shadow:0 6px 20px rgba(180,160,200,.18);
  font-size:14px;color:#b08a9a;line-height:1.7}
@media (orientation: landscape){
  #cards{flex-direction:row;align-items:center;justify-content:center;gap:3vw}
  .card{flex:none;height:100%;max-height:100%;aspect-ratio:1;max-width:29%;
    flex-direction:column;justify-content:center;gap:4px;padding:12px}
  .donut{height:58%;max-height:none}
  .info{align-items:center;text-align:center;gap:2px}
  .nm{font-size:15px}
  .sub{display:none}
  .rs{margin-top:0;font-size:11px}
}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="gPur" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9b8f5"/><stop offset="100%" stop-color="#a5c8fa"/>
    </linearGradient>
    <linearGradient id="gPink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7b6c8"/><stop offset="100%" stop-color="#f5a0b5"/>
    </linearGradient>
  </defs>
</svg>
<div class="hdr"><h1 id="title">Claude 用量 🐣</h1><div class="upd" id="upd">載入中…</div></div>
<div id="cards"></div>
<script>
var GAS = 'https://script.google.com/macros/s/AKfycbyAMQThp2VTQNNcL26mtYYhorVJPpzNYzOAQqzX-2NmDbGcjd4krWhTzGRSP573Oyzg9Q/exec';
var key = new URLSearchParams(location.search).get('key') || localStorage.getItem('k');
if (key) localStorage.setItem('k', key);

var META = {
  session:       { name: 'Session', sub: '5 小時額度', icon: '⚡️' },
  weekly_all:    { name: '本週',    sub: '所有模型',   icon: '🗓' },
  weekly_scoped: { name: 'Fable',  sub: '本週高階額度', icon: '✨' }
};
function mood(p){ return p >= 90 ? '🥵' : p >= 70 ? '😅' : p >= 40 ? '🙂' : '😴'; }
function fmt(d){
  if (!d || isNaN(d.getTime()) || d.getTime() === 0) return '—';
  return (d.getMonth()+1) + '/' + d.getDate() + ' ' +
    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function esc(s){ return String(s).replace(/[<>&"]/g, function(c){return '&#'+c.charCodeAt(0)+';';}); }

// 圓環量表：r=50、周長 314；12 點鐘方向起繞、圓角端點
function donut(pct){
  var C = 2 * Math.PI * 50;
  var off = C * (1 - Math.min(pct, 100) / 100);
  return '<svg class="donut" viewBox="0 0 120 120">' +
    '<g transform="rotate(-90 60 60)">' +
    '<circle class="track" cx="60" cy="60" r="50" fill="none" stroke-width="11"/>' +
    '<circle class="val" cx="60" cy="60" r="50" fill="none" stroke-width="11" stroke-linecap="round" ' +
      'stroke-dasharray="' + C + '" stroke-dashoffset="' + off + '"/></g>' +
    '<text class="dpc" x="60" y="69" text-anchor="middle"></text></svg>';
}

function render(data){
  var html = '', first = null;
  (data.limits || []).forEach(function(L){
    var m = META[L.kind];
    if (!m) return;
    if (first === null) first = L.percent;
    html += '<div class="card' + (L.percent >= 80 ? ' hi' : '') + '">' +
      donut(L.percent) +
      '<div class="info"><div class="nm">' + m.icon + ' ' + m.name + '</div>' +
      '<div class="sub">' + m.sub + '</div>' +
      '<div class="rs">🔄 ' + fmt(L.resets_at ? new Date(L.resets_at) : null) + ' 重置</div></div></div>';
  });
  var box = document.getElementById('cards');
  box.innerHTML = html;
  // emoji 與百分比塞進 SVG text（避免字串拼接跳脫問題）
  var cards = box.querySelectorAll('.card');
  var i = 0;
  (data.limits || []).forEach(function(L){
    if (!META[L.kind]) return;
    cards[i].querySelector('.dpc').textContent = L.percent + '%';
    i++;
  });
  document.getElementById('title').textContent = 'Claude 用量 ' + mood(first || 0);
  document.getElementById('upd').textContent = '更新於 ' + fmt(new Date()) + '・台北';
}

function showErr(msg){
  document.getElementById('cards').innerHTML = '<div class="err">😿 讀不到資料<br>' + esc(msg) +
    '<br>過幾分鐘再試，若一直失敗代表 token 需要重新播種</div>';
  document.getElementById('upd').textContent = '';
}

// GAS 對瀏覽器 fetch 不回 CORS 標頭，改用 JSONP（script 標籤不帶 Origin）
var loading = false;
function load(){
  if (loading) return;
  if (!key) { showErr('網址缺少 key 參數'); return; }
  loading = true;
  var done = false;
  window.__usage = function(d){
    done = true; loading = false;
    if (d && d.error) showErr(d.error); else render(d);
  };
  var s = document.createElement('script');
  s.src = GAS + '?key=' + encodeURIComponent(key) + '&callback=__usage&t=' + Date.now();
  s.onerror = function(){ done = true; loading = false; showErr('連線失敗'); };
  s.onload = function(){ s.remove(); };
  document.body.appendChild(s);
  setTimeout(function(){ if (!done) { loading = false; showErr('連線逾時'); } }, 15000);
}
load();
document.addEventListener('visibilitychange', function(){ if (!document.hidden) load(); });
setInterval(load, 60000);
</script>
</body>
</html>
